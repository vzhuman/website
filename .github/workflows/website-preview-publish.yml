# Publish Website Preview — privileged publish of an already-built artifact
# into constructorfabric/website-previews.
#
# IMPORTANT: this workflow does NOT check out PR code and does NOT execute any
# code from the artifact. It treats the artifact as opaque static files only.
# It runs in response to a successful Website PR CI run, uses a short-lived
# GitHub App installation token to write to the preview repository, and uses
# the default GITHUB_TOKEN to read from the source repository (download
# artifact, post PR comment).
#
# Security model:
#   - Triggered by workflow_run on Website PR CI (not by pull_request).
#   - PR number is read from the artifact (preview-meta.json), not from
#     workflow_run.pull_requests, which is unreliable (empty for fork PRs
#     and some other contexts).
#   - Uses actions/create-github-app-token@v2 with the AUTOMATION_APP_ID app,
#     scoped to the PREVIEW_REPOSITORY only. The App token is used only for
#     cloning and pushing the preview repository.
#   - The default GITHUB_TOKEN is used to download the artifact from the
#     source repository and to comment on the source PR. It does NOT have
#     write access to the source repository.
#   - The publish workflow has no write permission on the source repository.

name: Publish Website Preview

on:
  workflow_run:
    workflows: ["Website PR CI"]
    types: [completed]

# Permissions in the SOURCE repo:
#   - actions: read     -> needed to access workflow artifacts via gh CLI
#   - contents: read    -> required to clone via default token (unused here
#                          but kept minimal and explicit)
#   - pull-requests: read -> for gh pr comment (the default token scopes
#                            to the current repo)
#   - issues: write     -> to post the preview comment
# We do NOT need contents: write on this repo. The preview-repo write uses
# the GitHub App installation token, not the default GITHUB_TOKEN.
permissions:
  actions: read
  contents: read
  pull-requests: read
  issues: write

concurrency:
  # One publish per upstream CI run. The run id is unique per PR push, so
  # two pushes to the same PR don't serialize on each other, but the same
  # upstream run never publishes twice.
  group: website-preview-publish-run-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish preview to website-previews
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Only proceed when CI succeeded and the run was triggered by a PR.
    # Note: github.event.workflow_run.event is reliable; only
    # workflow_run.pull_requests[] is unreliable, which is why we don't
    # try to extract the PR number from it.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'

    steps:
      # Default GITHUB_TOKEN is used here to read from the source repo.
      - name: Download preview artifact from PR CI run
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: website-preview
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Downloading artifact '${ARTIFACT_NAME}' from run ${RUN_ID} in ${REPO}"
          gh run download "${RUN_ID}" \
            --repo "${REPO}" \
            --name "${ARTIFACT_NAME}" \
            --dir ./_artifact

          # Verify the artifact is non-empty.
          if [[ ! -d ./_artifact ]] || [[ -z "$(ls -A ./_artifact 2>/dev/null || true)" ]]; then
            echo "Error: artifact is empty or missing" >&2
            exit 1
          fi
          echo "Artifact downloaded:"
          ls -la ./_artifact

      - name: Read PR number from artifact
        id: pr
        run: |
          set -euo pipefail
          meta="./_artifact/preview-meta.json"
          if [[ ! -f "${meta}" ]]; then
            echo "Error: ${meta} not found in artifact" >&2
            exit 1
          fi
          pr_number="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("pr_number",""))' "${meta}")"
          if [[ -z "${pr_number}" || "${pr_number}" == "None" ]]; then
            echo "Error: pr_number missing or null in ${meta}" >&2
            cat "${meta}" >&2
            exit 1
          fi
          if ! [[ "${pr_number}" =~ ^[0-9]+$ ]]; then
            echo "Error: pr_number must be a positive integer (got '${pr_number}')" >&2
            exit 1
          fi
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"
          echo "Resolved PR number from artifact: ${pr_number}"

      - name: Resolve preview repository
        id: repo
        env:
          PREVIEW_REPO_VAR: ${{ vars.PREVIEW_REPOSITORY }}
        run: |
          set -euo pipefail
          # PREVIEW_REPOSITORY is "owner/name"; default to
          # constructorfabric/website-previews.
          preview_repo="${PREVIEW_REPO_VAR:-constructorfabric/website-previews}"
          preview_owner="${preview_repo%%/*}"
          preview_name="${preview_repo##*/}"
          if [[ -z "${preview_owner}" || -z "${preview_name}" || "${preview_repo}" != *"${preview_owner}/${preview_name}" ]]; then
            echo "Error: PREVIEW_REPOSITORY must be 'owner/name' (got '${preview_repo}')" >&2
            exit 1
          fi
          {
            echo "preview_repo=${preview_repo}"
            echo "preview_owner=${preview_owner}"
            echo "preview_name=${preview_name}"
          } >> "$GITHUB_OUTPUT"
          echo "Preview repo: ${preview_repo} (owner=${preview_owner}, name=${preview_name})"

      - name: Generate GitHub App installation token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
          # Owner and repository are split correctly per the v2 schema.
          # Token is scoped to both the preview repo (for clone/push) and
          # the source repo (for PR comment). Fork PRs can't use the
          # default GITHUB_TOKEN to comment on the PR — see the comment
          # step below for why we need the App token there.
          owner: ${{ steps.repo.outputs.preview_owner }}
          repositories: ${{ steps.repo.outputs.preview_name }},${{ github.event.repository.name }}

      # App token is used for everything that writes to the preview repo.
      - name: Checkout preview repository
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PREVIEW_REPO: ${{ steps.repo.outputs.preview_repo }}
        run: |
          set -euo pipefail
          # Use the App token; do NOT use the default GITHUB_TOKEN.
          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${PREVIEW_REPO}.git" \
            ./_preview_repo
          cd ./_preview_repo
          git config user.name "constructorfabric-website-bot"
          git config user.email "bot@constructorfabric.invalid"

      - name: Copy artifact into pr-<n>/
        run: |
          set -euo pipefail
          pr_number="${{ steps.pr.outputs.pr_number }}"
          target="./_preview_repo/pr-${pr_number}"
          rm -rf "${target}"
          mkdir -p "${target}"
          # Copy artifact contents (including dotfiles).
          shopt -s dotglob nullglob
          cp -R ./_artifact/* "${target}/"
          echo "Copied to ${target}:"
          ls -la "${target}"

      - name: Commit and push preview
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail
          cd ./_preview_repo
          pr_number="${{ steps.pr.outputs.pr_number }}"
          git add "pr-${pr_number}"
          # If nothing changed (extremely unlikely after rm -rf), skip.
          if git diff --cached --quiet; then
            echo "No changes to commit for pr-${pr_number}"
            exit 0
          fi
          git commit -m "Deploy preview for PR #${pr_number}"
          git push origin main
          echo "Pushed pr-${pr_number} to website-previews main"

      # Use the App token here, not the default GITHUB_TOKEN. For fork PRs,
      # the default GITHUB_TOKEN is locked to read-only by GitHub and cannot
      # comment on the source PR ("Resource not accessible by integration
      # (addComment)"). The App token is scoped to constructorfabric/website
      # via the app_token step above and has Issues + PRs write access.
      - name: Comment on source PR with preview URL
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          PREVIEW_OWNER: ${{ steps.repo.outputs.preview_owner }}
          PREVIEW_NAME: ${{ steps.repo.outputs.preview_name }}
        run: |
          set -euo pipefail
          # GitHub Pages URL pattern for org/user pages: <owner>.github.io/<repo>/...
          preview_url="https://${PREVIEW_OWNER}.github.io/${PREVIEW_NAME}/pr-${PR_NUMBER}/"
          retention_days="${{ vars.PREVIEW_RETENTION_DAYS }}"
          retention_days="${retention_days:-30}"
          printf '%s\n\n%s\n\n%s\n' \
            "Preview deployment is ready:" \
            "${preview_url}" \
            "This preview is built from the latest commit on this PR. It is regenerated automatically on every push. Old previews are cleaned up after ${retention_days} days." \
            > /tmp/preview_comment.md
          gh pr comment "${PR_NUMBER}" --repo "${{ github.repository }}" --body-file /tmp/preview_comment.md
          echo "Posted preview URL to PR #${PR_NUMBER}"